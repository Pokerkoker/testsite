<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download je foto</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.button{
display:inline-block;
margin-top:20px;
padding:15px 25px;
font-size:18px;
background:#007BFF;
color:white;
text-decoration:none;
border-radius:8px;
}

.button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>📸 Je foto</h2>

<img id="photo">

<br>

<a id="downloadBtn" class="button">⬇️ Download foto</a>

<p style="margin-top:15px;color:#666;">
Stappenplan : 
  1. druk op de knop download foto.
  2. hou de foto ingedrukt.
  3. druk op foto downloaden.
  4. zoek de foto's binnen bestanden --> binnen downloads
</p>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const img = params.get("img");

document.getElementById("photo").src = img;
document.getElementById("downloadBtn").href = img;

</script>

</body>
</html>
